databases:
  - name: govq-db
    databaseName: govq
    user: govq_user
    plan: free

services:
  - type: redis
    name: govq-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: govq-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT govt_token.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: govq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: govq-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: FRONTEND_URL
        value: "https://gov-q.vercel.app"
      # Add your RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET directly in the Render dashboard
